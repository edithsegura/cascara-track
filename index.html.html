<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CáscaraTrack — SFS Ingeniería</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #ccd6f6; font-family: 'DM Sans', 'Segoe UI', sans-serif; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0d1117; }
  ::-webkit-scrollbar-thumb { background: #2d3561; border-radius: 3px; }
  table { width: 100%; border-collapse: collapse; }
  button { cursor: pointer; font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;
const {
  BarChart, Bar, LineChart, Line,
  XAxis, YAxis, CartesianGrid, Tooltip,
  ResponsiveContainer, ReferenceLine, Cell
} = Recharts;

// ── Datos ──────────────────────────────────────────────────────────────
const lotesMes = [
  { mes:"Ago", aprobados:42, rechazados:3 },
  { mes:"Sep", aprobados:38, rechazados:5 },
  { mes:"Oct", aprobados:51, rechazados:2 },
  { mes:"Nov", aprobados:47, rechazados:4 },
  { mes:"Dic", aprobados:55, rechazados:1 },
  { mes:"Ene", aprobados:49, rechazados:6 },
];

const humedadTurnos = [
  { turno:"T1-Lun", valor:10.2 }, { turno:"T2-Lun", valor:11.8 },
  { turno:"T1-Mar", valor:9.4  }, { turno:"T2-Mar", valor:12.4 },
  { turno:"T1-Mié", valor:10.9 }, { turno:"T2-Mié", valor:11.1 },
  { turno:"T1-Jue", valor:9.8  }, { turno:"T2-Jue", valor:10.5 },
  { turno:"T1-Vie", valor:11.3 }, { turno:"T2-Vie", valor:13.1 },
];

const pectinaTendencia = [
  { s:"S1",v:28.4 },{ s:"S2",v:29.1 },{ s:"S3",v:27.8 },{ s:"S4",v:30.2 },
  { s:"S5",v:31.0 },{ s:"S6",v:29.5 },{ s:"S7",v:28.9 },{ s:"S8",v:32.1 },
];

const lotesData = [
  { id:"LOT-2401", fecha:"10/01", humedad:10.2, pectina:31.4, micro:"OK", agro:"OK",    estado:"APROBADO",    destino:"Alemania" },
  { id:"LOT-2402", fecha:"11/01", humedad:11.8, pectina:29.8, micro:"OK", agro:"OK",    estado:"APROBADO",    destino:"Francia" },
  { id:"LOT-2403", fecha:"12/01", humedad:13.1, pectina:26.2, micro:"OK", agro:"ALERTA",estado:"RECHAZADO",   destino:"—" },
  { id:"LOT-2404", fecha:"13/01", humedad:10.9, pectina:30.5, micro:"OK", agro:"OK",    estado:"APROBADO",    destino:"USA" },
  { id:"LOT-2405", fecha:"14/01", humedad:11.2, pectina:28.7, micro:"OK", agro:"OK",    estado:"EN ANÁLISIS", destino:"—" },
];

const fincas = [
  { nombre:"Finca El Ángel",   lotes:18, traz:94, agro:100, cos:100 },
  { nombre:"Coop. COTA",       lotes:32, traz:71, agro:85,  cos:90  },
  { nombre:"Prod. Zerolo",     lotes:12, traz:100,agro:100, cos:100 },
  { nombre:"Finca Los Nogales",lotes:8,  traz:50, agro:62,  cos:75  },
  { nombre:"Agro San Isidro",  lotes:21, traz:86, agro:95,  cos:98  },
];

const alertas = [
  { tipo:"CRÍTICO", msg:"LOT-2403 humedad 13.1% — supera límite BRC (12%)",              hora:"hace 2h",  color:"#FF4757" },
  { tipo:"CRÍTICO", msg:"LOT-2403 residuo clorpirifos > LMR UE — lote retenido",         hora:"hace 2h",  color:"#FF4757" },
  { tipo:"AVISO",   msg:"Finca Los Nogales: 4 lotes sin registros fitosanitarios",        hora:"hace 5h",  color:"#FFA502" },
  { tipo:"AVISO",   msg:"LOT-2402 tiempo liberación: 38h — meta < 24h",                  hora:"hace 8h",  color:"#FFA502" },
  { tipo:"INFO",    msg:"Auditoría BRC programada: 15 Feb — 12 lotes pendientes",         hora:"hace 1d",  color:"#2ED573" },
];

const acciones = [
  { n:1, texto:"Retener lote — No despachar hasta resolución",                         resp:"Jefe Calidad",     est:"PENDIENTE" },
  { n:2, texto:"Enviar muestra a laboratorio externo certificado (INTI / LSQA)",        resp:"Lab. Interno",     est:"EN CURSO"  },
  { n:3, texto:"Notificar a Finca Los Nogales sobre residuo clorpirifos",               resp:"Ger. Compras",     est:"PENDIENTE" },
  { n:4, texto:"Investigar turno T2-Vie — posible causa: temperatura de secado baja",   resp:"Prod. Industrial", est:"PENDIENTE" },
];

const cadena = [
  { icon:"🌱", label:"CAMPO",       sub:"Finca El Ángel",       date:"28/12" },
  { icon:"✂️", label:"COSECHA",     sub:"Cuadrante B3",         date:"02/01" },
  { icon:"🏭", label:"EMPAQUE",     sub:"Recepción + análisis", date:"03/01" },
  { icon:"🔥", label:"SECADO",      sub:"Turno 1 — 6.5hs",     date:"05/01" },
  { icon:"🧪", label:"LABORATORIO", sub:"Fisicoquímico + micro",date:"07/01" },
  { icon:"✅", label:"LIBERACIÓN",  sub:"Aprobado BRC",         date:"10/01" },
  { icon:"🚢", label:"EXPORTACIÓN", sub:"Hamburgo, DE",         date:"15/01" },
];

// ── Componentes base ────────────────────────────────────────────────────
const KPI = ({ label, value, unit, sub, color, trend, alerta }) => (
  <div style={{
    background:"linear-gradient(135deg,#1a1f2e,#222840)",
    border:`1px solid ${alerta?"#FF4757":color+"33"}`,
    borderLeft:`4px solid ${alerta?"#FF4757":color}`,
    borderRadius:12, padding:"18px 20px", position:"relative", overflow:"hidden",
  }}>
    <div style={{ position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:color+"11" }}/>
    <div style={{ fontSize:10,color:"#8892b0",textTransform:"uppercase",letterSpacing:1.5,marginBottom:8 }}>{label}</div>
    <div style={{ display:"flex",alignItems:"baseline",gap:6 }}>
      <span style={{ fontSize:30,fontWeight:800,color:alerta?"#FF4757":"#e8f0fe",fontFamily:"'DM Mono',monospace" }}>{value}</span>
      <span style={{ fontSize:13,color,fontWeight:600 }}>{unit}</span>
    </div>
    <div style={{ fontSize:11,marginTop:6,color:trend&&trend.startsWith("+")?"#2ED573":trend&&trend.startsWith("−")?"#FF4757":"#8892b0" }}>
      {trend && <span>{trend}&nbsp;&nbsp;</span>}
      <span style={{ color:"#8892b0" }}>{sub}</span>
    </div>
    {alerta && <div style={{ fontSize:10,color:"#FF4757",marginTop:4,fontWeight:700 }}>⚠ {alerta}</div>}
  </div>
);

const Titulo = ({ children, color }) => (
  <div style={{ display:"flex",alignItems:"center",gap:10,marginBottom:16 }}>
    <div style={{ width:4,height:18,background:color||"#F0C040",borderRadius:2 }}/>
    <span style={{ fontSize:11,fontWeight:700,color:"#ccd6f6",textTransform:"uppercase",letterSpacing:2 }}>{children}</span>
  </div>
);

const Card = ({ children, style }) => (
  <div style={{ background:"#1a1f2e",borderRadius:12,padding:20,border:"1px solid #2d3561",...style }}>
    {children}
  </div>
);

const TT = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background:"#1a1f2e",border:"1px solid #2d3561",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#ccd6f6" }}>
      <div style={{ color:"#8892b0",marginBottom:4 }}>{label}</div>
      {payload.map((p,i)=>(
        <div key={i} style={{ color:p.color }}>{p.name}: <b>{p.value}</b>{["humedad","valor","pectina"].includes(p.name)?"%":""}</div>
      ))}
    </div>
  );
};

// ── App Principal ────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("calidad");

  const tabs = [
    { id:"calidad",      label:"🧪 Calidad" },
    { id:"trazabilidad", label:"🔗 Trazabilidad" },
    { id:"alertas",      label:"🚨 Alertas", badge:2 },
    { id:"lotes",        label:"📦 Lotes" },
  ];

  return (
    <div style={{ background:"#0d1117",minHeight:"100vh",color:"#ccd6f6" }}>

      {/* ── HEADER ── */}
      <div style={{
        background:"linear-gradient(90deg,#0d1117,#1a1f2e 50%,#0d1117)",
        borderBottom:"1px solid #2d3561", padding:"16px 28px",
        display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12,
      }}>
        <div style={{ display:"flex",alignItems:"center",gap:12 }}>
          <div style={{ width:38,height:38,borderRadius:8,background:"linear-gradient(135deg,#F0C040,#E8A020)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20 }}>🍋</div>
          <div>
            <div style={{ fontSize:17,fontWeight:800,color:"#e8f0fe",letterSpacing:.5 }}>CáscaraTrack</div>
            <div style={{ fontSize:9,color:"#8892b0",letterSpacing:1.5 }}>CONTROL DE CALIDAD · CÁSCARA DESHIDRATADA · NOA</div>
          </div>
        </div>
        <div style={{ display:"flex",alignItems:"center",gap:20 }}>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:9,color:"#8892b0" }}>TEMPORADA</div>
            <div style={{ fontSize:13,color:"#F0C040",fontWeight:700 }}>AGO 2024 — ENE 2025</div>
          </div>
          <div style={{ background:"#2ED57322",border:"1px solid #2ED573",borderRadius:20,padding:"5px 14px",fontSize:11,color:"#2ED573",fontWeight:700 }}>● DEMO</div>
        </div>
      </div>

      <div style={{ padding:"22px 28px" }}>

        {/* ── KPIs ── */}
        <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:14,marginBottom:28 }}>
          <KPI label="Lotes Aprobados (mes)" value="49" unit="lotes" sub="de 55 procesados"       color="#2ED573" trend="+6%"/>
          <KPI label="Tasa de Aprobación"    value="89.1" unit="%"  sub="meta ≥ 92%"              color="#F0C040" trend="−2.1%"/>
          <KPI label="Humedad Promedio"       value="10.8" unit="%" sub="límite BRC: 12%"          color="#3B82F6" trend="estable"/>
          <KPI label="Pectina Promedio"       value="29.6" unit="%" sub="mín. exportación: 25%"    color="#A78BFA" trend="+1.2%"/>
          <KPI label="Lotes con Alerta"       value="2"   unit="lotes" sub="requieren acción"      color="#FF4757" alerta="Ver sección Alertas"/>
          <KPI label="Tiempo Liberación Lote" value="26.4" unit="hs" sub="meta < 24h"             color="#FFA502" trend="−3.1h"/>
        </div>

        {/* ── TABS ── */}
        <div style={{ display:"flex",gap:4,marginBottom:24,borderBottom:"1px solid #2d3561" }}>
          {tabs.map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              background:tab===t.id?"#1a1f2e":"transparent",
              border:"none", borderBottom:tab===t.id?"2px solid #F0C040":"2px solid transparent",
              color:tab===t.id?"#e8f0fe":"#8892b0",
              padding:"10px 18px", fontSize:12, fontWeight:600,
              borderRadius:"6px 6px 0 0", position:"relative",
            }}>
              {t.label}
              {t.badge && <span style={{ background:"#FF4757",color:"#fff",borderRadius:10,fontSize:9,fontWeight:700,padding:"1px 5px",marginLeft:6 }}>{t.badge}</span>}
            </button>
          ))}
        </div>

        {/* ── TAB CALIDAD ── */}
        {tab==="calidad" && (
          <div>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:20 }}>
              <Card>
                <Titulo color="#FF4757">Humedad por Turno de Secado (%)</Titulo>
                <div style={{ fontSize:10,color:"#8892b0",marginBottom:10 }}>Línea roja = límite BRC 12% · Turno T2-Vie supera el límite</div>
                <ResponsiveContainer width="100%" height={220}>
                  <BarChart data={humedadTurnos} barSize={16}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#2d3561"/>
                    <XAxis dataKey="turno" tick={{ fill:"#8892b0",fontSize:8 }}/>
                    <YAxis domain={[8,14]} tick={{ fill:"#8892b0",fontSize:9 }}/>
                    <Tooltip content={<TT/>}/>
                    <ReferenceLine y={12} stroke="#FF4757" strokeDasharray="4 4" strokeWidth={2}
                      label={{ value:"LÍM 12%", fill:"#FF4757", fontSize:9, position:"insideTopRight" }}/>
                    <Bar dataKey="valor" name="humedad" radius={[4,4,0,0]}>
                      {humedadTurnos.map((d,i)=><Cell key={i} fill={d.valor>12?"#FF4757":"#3B82F6"}/>)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </Card>

              <Card>
                <Titulo color="#A78BFA">Tendencia Pectina (%) — 8 semanas</Titulo>
                <div style={{ fontSize:10,color:"#8892b0",marginBottom:10 }}>Mínimo exportación UE: 25% · Tendencia alcista positiva</div>
                <ResponsiveContainer width="100%" height={220}>
                  <LineChart data={pectinaTendencia}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#2d3561"/>
                    <XAxis dataKey="s" tick={{ fill:"#8892b0",fontSize:10 }}/>
                    <YAxis domain={[24,34]} tick={{ fill:"#8892b0",fontSize:9 }}/>
                    <Tooltip content={<TT/>}/>
                    <ReferenceLine y={25} stroke="#FFA502" strokeDasharray="4 4"
                      label={{ value:"MÍN 25%", fill:"#FFA502", fontSize:9, position:"insideTopRight" }}/>
                    <Line type="monotone" dataKey="v" name="pectina" stroke="#A78BFA" strokeWidth={2.5}
                      dot={{ fill:"#A78BFA",r:4 }} activeDot={{ r:6 }}/>
                  </LineChart>
                </ResponsiveContainer>
              </Card>
            </div>

            <Card>
              <Titulo color="#2ED573">Lotes Aprobados vs. Rechazados por Mes</Titulo>
              <ResponsiveContainer width="100%" height={200}>
                <BarChart data={lotesMes} barGap={4}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#2d3561"/>
                  <XAxis dataKey="mes" tick={{ fill:"#8892b0",fontSize:11 }}/>
                  <YAxis tick={{ fill:"#8892b0",fontSize:10 }}/>
                  <Tooltip content={<TT/>}/>
                  <Bar dataKey="aprobados" name="aprobados" fill="#2ED573" radius={[4,4,0,0]} barSize={26}/>
                  <Bar dataKey="rechazados" name="rechazados" fill="#FF4757" radius={[4,4,0,0]} barSize={26}/>
                </BarChart>
              </ResponsiveContainer>
            </Card>
          </div>
        )}

        {/* ── TAB TRAZABILIDAD ── */}
        {tab==="trazabilidad" && (
          <div style={{ display:"flex",flexDirection:"column",gap:20 }}>
            <Card>
              <Titulo color="#F0C040">Cobertura de Trazabilidad por Proveedor (%)</Titulo>
              <div style={{ fontSize:10,color:"#8892b0",marginBottom:16 }}>Mínimo exigido BRC Global: 85% · Rojo = acción requerida antes de auditoría</div>
              {fincas.map((f,i)=>(
                <div key={i} style={{ marginBottom:16 }}>
                  <div style={{ display:"flex",justifyContent:"space-between",marginBottom:8 }}>
                    <div>
                      <span style={{ fontSize:12,fontWeight:700,color:"#ccd6f6" }}>{f.nombre}</span>
                      <span style={{ fontSize:10,color:"#8892b0",marginLeft:10 }}>{f.lotes} lotes</span>
                    </div>
                    <span style={{ fontSize:13,fontWeight:800,color:f.traz>=85?"#2ED573":f.traz>=70?"#FFA502":"#FF4757" }}>{f.traz}%</span>
                  </div>
                  <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6 }}>
                    {[["Trazabilidad general",f.traz],["Registros agroquímicos",f.agro],["Registros cosecha",f.cos]].map(([lbl,val],j)=>(
                      <div key={j}>
                        <div style={{ fontSize:9,color:"#8892b0",marginBottom:3 }}>{lbl}</div>
                        <div style={{ background:"#0d1117",borderRadius:4,height:8,overflow:"hidden" }}>
                          <div style={{ width:`${val}%`,height:"100%",borderRadius:4,
                            background:val>=85?"#2ED573":val>=70?"#FFA502":"#FF4757",transition:"width .8s ease" }}/>
                        </div>
                        <div style={{ fontSize:9,color:"#8892b0",marginTop:2 }}>{val}%</div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </Card>

            <Card>
              <Titulo color="#3B82F6">Cadena de Trazabilidad — LOT-2401 (Finca El Ángel → Alemania)</Titulo>
              <div style={{ display:"flex",alignItems:"center",overflowX:"auto",padding:"10px 0",gap:0 }}>
                {cadena.map((s,i)=>(
                  <div key={i} style={{ display:"flex",alignItems:"center",flexShrink:0 }}>
                    <div style={{ textAlign:"center",width:88 }}>
                      <div style={{ width:44,height:44,borderRadius:"50%",margin:"0 auto 6px",
                        background:"#2ED57322",border:"2px solid #2ED573",
                        display:"flex",alignItems:"center",justifyContent:"center",fontSize:18 }}>{s.icon}</div>
                      <div style={{ fontSize:8,fontWeight:700,color:"#ccd6f6",textTransform:"uppercase",letterSpacing:.5 }}>{s.label}</div>
                      <div style={{ fontSize:9,color:"#8892b0",marginTop:2 }}>{s.sub}</div>
                      <div style={{ fontSize:9,color:"#F0C040",marginTop:2 }}>{s.date}</div>
                    </div>
                    {i<cadena.length-1 && <div style={{ width:20,height:2,background:"#2ED573",flexShrink:0 }}/>}
                  </div>
                ))}
              </div>
              <div style={{ marginTop:16,padding:"10px 14px",background:"#2ED57311",border:"1px solid #2ED57333",borderRadius:8,fontSize:11,color:"#2ED573" }}>
                ✓ Trazabilidad completa — Este lote puede ser auditado en &lt; 2 horas · Cumple BRC Global Standard
              </div>
            </Card>
          </div>
        )}

        {/* ── TAB ALERTAS ── */}
        {tab==="alertas" && (
          <div style={{ display:"flex",flexDirection:"column",gap:16 }}>
            <Card>
              <Titulo color="#FF4757">Centro de Alertas Activas</Titulo>
              {alertas.map((a,i)=>(
                <div key={i} style={{
                  display:"flex",alignItems:"flex-start",gap:12,
                  padding:"14px 16px",marginBottom:8,
                  background:a.color+"10",border:`1px solid ${a.color}33`,
                  borderLeft:`4px solid ${a.color}`,borderRadius:8,
                }}>
                  <div style={{ background:a.color+"22",border:`1px solid ${a.color}`,borderRadius:6,padding:"3px 8px",
                    fontSize:9,fontWeight:800,color:a.color,flexShrink:0,letterSpacing:1 }}>{a.tipo}</div>
                  <div style={{ flex:1,fontSize:12,color:"#ccd6f6",lineHeight:1.5 }}>{a.msg}</div>
                  <div style={{ fontSize:10,color:"#8892b0",flexShrink:0,whiteSpace:"nowrap" }}>{a.hora}</div>
                </div>
              ))}
            </Card>

            <Card style={{ border:"1px solid #FF475733" }}>
              <Titulo color="#FF4757">Plan de Acciones — LOT-2403 (Rechazado)</Titulo>
              {acciones.map((a,i)=>(
                <div key={i} style={{ display:"flex",alignItems:"center",gap:12,
                  padding:"12px 0",borderBottom:i<acciones.length-1?"1px solid #2d3561":"none" }}>
                  <div style={{ width:26,height:26,borderRadius:"50%",background:"#FF475722",
                    border:"1px solid #FF4757",display:"flex",alignItems:"center",
                    justifyContent:"center",fontSize:11,color:"#FF4757",fontWeight:800,flexShrink:0 }}>{a.n}</div>
                  <div style={{ flex:1,fontSize:12,color:"#ccd6f6",lineHeight:1.4 }}>{a.texto}</div>
                  <div style={{ fontSize:10,color:"#8892b0",minWidth:110,textAlign:"right" }}>{a.resp}</div>
                  <div style={{ fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:4,whiteSpace:"nowrap",
                    color:a.est==="EN CURSO"?"#FFA502":"#FF4757",
                    background:(a.est==="EN CURSO"?"#FFA502":"#FF4757")+"22",
                    border:`1px solid ${a.est==="EN CURSO"?"#FFA502":"#FF4757"}` }}>{a.est}</div>
                </div>
              ))}
            </Card>
          </div>
        )}

        {/* ── TAB LOTES ── */}
        {tab==="lotes" && (
          <Card>
            <Titulo color="#3B82F6">Registro de Lotes — Enero 2025</Titulo>
            <div style={{ overflowX:"auto",marginBottom:20 }}>
              <table>
                <thead>
                  <tr style={{ borderBottom:"1px solid #2d3561" }}>
                    {["Lote","Fecha","Humedad %","Pectina %","Microbiológico","Agroquímicos","Destino","Estado"].map(h=>(
                      <th key={h} style={{ padding:"10px 12px",textAlign:"left",fontSize:9,color:"#8892b0",textTransform:"uppercase",letterSpacing:1,fontWeight:600,whiteSpace:"nowrap" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {lotesData.map((l,i)=>(
                    <tr key={i} style={{ borderBottom:"1px solid #2d356140",background:l.estado==="RECHAZADO"?"#FF475708":"transparent" }}>
                      <td style={{ padding:"12px",color:"#F0C040",fontWeight:700,fontFamily:"monospace",fontSize:12 }}>{l.id}</td>
                      <td style={{ padding:"12px",color:"#8892b0",fontSize:12 }}>{l.fecha}</td>
                      <td style={{ padding:"12px",color:l.humedad>12?"#FF4757":"#2ED573",fontWeight:700,fontSize:12 }}>{l.humedad}%</td>
                      <td style={{ padding:"12px",color:l.pectina<25?"#FF4757":"#A78BFA",fontWeight:700,fontSize:12 }}>{l.pectina}%</td>
                      <td style={{ padding:"12px",fontSize:12 }}>
                        <span style={{ color:l.micro==="OK"?"#2ED573":"#FF4757",fontWeight:700 }}>{l.micro==="OK"?"✓ OK":"✗ FALLO"}</span>
                      </td>
                      <td style={{ padding:"12px",fontSize:12 }}>
                        <span style={{ color:l.agro==="OK"?"#2ED573":"#FF4757",fontWeight:700 }}>{l.agro==="OK"?"✓ OK":"⚠ ALERTA"}</span>
                      </td>
                      <td style={{ padding:"12px",color:"#ccd6f6",fontSize:12 }}>{l.destino}</td>
                      <td style={{ padding:"12px" }}>
                        <span style={{ fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:4,
                          background:l.estado==="APROBADO"?"#2ED57322":l.estado==="RECHAZADO"?"#FF475722":"#FFA50222",
                          color:l.estado==="APROBADO"?"#2ED573":l.estado==="RECHAZADO"?"#FF4757":"#FFA502",
                          border:`1px solid ${l.estado==="APROBADO"?"#2ED573":l.estado==="RECHAZADO"?"#FF4757":"#FFA502"}` }}>
                          {l.estado}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div style={{ display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12 }}>
              {[
                { label:"Tiempo promedio campo → exportación", value:"13 días", color:"#3B82F6" },
                { label:"% lotes con trazabilidad completa",   value:"81.8%",  color:"#FFA502" },
                { label:"Recall: tiempo de aislamiento lote",  value:"< 2 hs", color:"#2ED573" },
              ].map((m,i)=>(
                <div key={i} style={{ background:"#0d1117",borderRadius:8,padding:"14px 16px",border:`1px solid ${m.color}33` }}>
                  <div style={{ fontSize:10,color:"#8892b0",marginBottom:6,lineHeight:1.4 }}>{m.label}</div>
                  <div style={{ fontSize:22,fontWeight:800,color:m.color,fontFamily:"'DM Mono',monospace" }}>{m.value}</div>
                </div>
              ))}
            </div>
          </Card>
        )}

        {/* Footer */}
        <div style={{ marginTop:28,borderTop:"1px solid #2d3561",paddingTop:14,
          display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8 }}>
          <div style={{ fontSize:10,color:"#8892b0" }}>SFS Ingeniería y Servicios S.A.S. · Demo comercial · datos simulados</div>
          <div style={{ fontSize:10,color:"#8892b0" }}>BRC Global Standard · SGF · SENASA Res. 21/2025 · Global G.A.P.</div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
